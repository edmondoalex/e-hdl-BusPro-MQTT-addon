<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ekonex Home+</title>
    <style>
      :root{
        --bg:#05070b;
        --fg:#f3f6ff;
        --muted:rgba(243,246,255,.66);
        --soft:rgba(243,246,255,.10);
        --line:rgba(255,255,255,.15);
        --panel:rgba(10,13,20,.68);
        --panel-strong:rgba(14,18,27,.88);
        --accent:#e7be62;
        --ok:#63d297;
        --warn:#ffcf6f;
        --bad:#ff7474;
      }
      *{box-sizing:border-box}
      html,body{min-height:100%}
      body{
        margin:0;
        color:var(--fg);
        font-family:system-ui, "Segoe UI", Roboto, Arial, sans-serif;
        background:
          radial-gradient(980px 640px at 72% 16%, rgba(71,111,148,.30), transparent 56%),
          radial-gradient(820px 560px at 18% 80%, rgba(153,64,55,.28), transparent 60%),
          linear-gradient(140deg, #0d1119 0%, #05070b 58%, #020304 100%);
        -webkit-font-smoothing:antialiased;
        text-rendering:optimizeLegibility;
      }
      .bg-photo{
        position:fixed;
        inset:0;
        z-index:-2;
        background:center/cover no-repeat;
        opacity:.30;
        filter:saturate(.85) contrast(1.05);
      }
      .veil{
        position:fixed;
        inset:0;
        z-index:-1;
        background:
          linear-gradient(90deg, rgba(0,0,0,.34), rgba(0,0,0,.08) 46%, rgba(0,0,0,.44)),
          linear-gradient(180deg, rgba(0,0,0,.30), rgba(0,0,0,.68));
      }
      .top{
        height:76px;
        padding:14px 18px;
        display:grid;
        grid-template-columns:1fr auto 1fr;
        align-items:center;
        gap:14px;
      }
      .brand{
        display:flex;
        align-items:center;
        justify-content:center;
        gap:12px;
        min-width:0;
      }
      .brand img{
        width:42px;
        height:42px;
        object-fit:contain;
        filter:drop-shadow(0 10px 24px rgba(0,0,0,.55));
      }
      .title{
        font-size:38px;
        line-height:1;
        font-weight:650;
        letter-spacing:.10em;
        text-transform:uppercase;
      }
      .sub{
        justify-self:end;
        display:flex;
        align-items:center;
        gap:8px;
        color:var(--muted);
        font-size:13px;
        min-width:0;
      }
      .dot{
        width:8px;
        height:8px;
        border-radius:999px;
        background:var(--warn);
        box-shadow:0 0 18px rgba(255,207,111,.55);
      }
      .sub.online .dot{background:var(--ok);box-shadow:0 0 18px rgba(99,210,151,.55)}
      .sub.offline .dot{background:var(--bad);box-shadow:0 0 18px rgba(255,116,116,.55)}
      .btn{
        border:1px solid var(--line);
        background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
        color:var(--fg);
        border-radius:8px;
        padding:9px 12px;
        font-size:13px;
        font-weight:650;
        cursor:pointer;
      }
      .btn:hover{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.12)}
      .btn:active{transform:translateY(1px)}
      .main{
        width:min(1580px, calc(100vw - 32px));
        margin:0 auto;
        padding:6px 0 26px;
      }
      .widgets{
        display:grid;
        gap:12px;
        grid-template-columns:repeat(12,minmax(0,1fr));
        align-items:stretch;
      }
      .widget{
        position:relative;
        border:1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.026)),
          var(--panel);
        backdrop-filter:blur(14px);
        border-radius:8px;
        min-height:138px;
        overflow:hidden;
        box-shadow:0 18px 55px rgba(0,0,0,.28);
      }
      .widget::before{
        content:"";
        position:absolute;
        inset:0;
        background:linear-gradient(135deg, rgba(255,255,255,.10), transparent 34%);
        pointer-events:none;
      }
      .w-head{
        position:relative;
        z-index:1;
        display:flex;
        align-items:center;
        justify-content:space-between;
        min-height:40px;
        border-bottom:1px solid rgba(255,255,255,.09);
        padding:9px 12px;
        font-size:12px;
        letter-spacing:.16em;
        text-transform:uppercase;
        color:var(--muted);
      }
      .w-body{position:relative;z-index:1;padding:12px}
      .quick{grid-column:span 8}
      .clock{grid-column:span 4;min-height:322px}
      .fav{grid-column:span 8}
      .status{grid-column:span 4}
      .tiles{
        display:grid;
        grid-template-columns:repeat(var(--cols, 5), minmax(0,1fr));
        gap:10px;
      }
      .tile{
        position:relative;
        border:1px solid rgba(255,255,255,.14);
        background:linear-gradient(180deg, rgba(255,255,255,.095), rgba(255,255,255,.035));
        color:var(--fg);
        text-decoration:none;
        min-height:122px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:10px;
        padding:12px 10px;
        border-radius:8px;
        overflow:hidden;
        -webkit-tap-highlight-color:transparent;
      }
      .tile::after{
        content:"";
        position:absolute;
        inset:0;
        background:radial-gradient(180px 110px at 50% 0%, rgba(231,190,98,.18), transparent 64%);
        opacity:.58;
        pointer-events:none;
      }
      .tile:hover{
        border-color:rgba(231,190,98,.44);
        transform:translateY(-1px);
        box-shadow:0 18px 34px rgba(0,0,0,.30);
      }
      .tile:active{transform:translateY(0) scale(.992)}
      .ico{
        width:36px;
        height:36px;
        background:var(--fg);
        opacity:.94;
        -webkit-mask-repeat:no-repeat;
        -webkit-mask-position:center;
        -webkit-mask-size:contain;
        mask-repeat:no-repeat;
        mask-position:center;
        mask-size:contain;
        filter:drop-shadow(0 8px 14px rgba(0,0,0,.38));
      }
      .lbl{
        max-width:100%;
        font-size:15px;
        font-weight:650;
        text-align:center;
        line-height:1.15;
        overflow-wrap:anywhere;
      }
      .clockFace{
        min-height:244px;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        gap:18px;
      }
      .time{
        font-size:80px;
        line-height:.92;
        letter-spacing:0;
        font-weight:720;
      }
      .date{
        max-width:340px;
        font-size:18px;
        color:rgba(243,246,255,.78);
        line-height:1.3;
      }
      .miniStats{
        display:grid;
        grid-template-columns:repeat(3,minmax(0,1fr));
        gap:8px;
      }
      .mini{
        border:1px solid rgba(255,255,255,.11);
        background:rgba(0,0,0,.20);
        border-radius:8px;
        padding:10px 8px;
      }
      .mini b{display:block;font-size:22px;line-height:1}
      .mini span{display:block;margin-top:5px;color:var(--muted);font-size:12px}
      .status-list{
        display:grid;
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:10px;
      }
      .status-item{
        min-height:78px;
        display:flex;
        flex-direction:column;
        justify-content:space-between;
        gap:8px;
        border:1px solid rgba(255,255,255,.11);
        background:rgba(0,0,0,.18);
        border-radius:8px;
        padding:12px;
      }
      .status-item span{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.10em}
      .status-item strong{font-size:22px;line-height:1}
      .panel{
        position:fixed;
        top:0;
        right:0;
        height:100%;
        width:min(470px,92vw);
        background:var(--panel-strong);
        border-left:1px solid var(--line);
        transform:translateX(110%);
        transition:transform .22s ease;
        z-index:40;
        padding:14px;
        overflow:auto;
        box-shadow:-30px 0 80px rgba(0,0,0,.38);
      }
      .panel.show{transform:translateX(0)}
      .panelTop{display:flex;justify-content:space-between;align-items:center;gap:12px}
      .panel h3{
        margin:6px 0 12px;
        letter-spacing:.10em;
        text-transform:uppercase;
        font-size:13px;
      }
      .row{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        padding:10px 0;
        border-bottom:1px solid rgba(255,255,255,.08);
      }
      .row input[type="text"], .row input[type="number"]{
        width:210px;
        max-width:54vw;
        background:#0e1422;
        color:#fff;
        border:1px solid var(--line);
        border-radius:8px;
        padding:8px 9px;
      }
      .ord{display:flex;gap:6px}
      .ord button{min-width:36px;padding:6px 8px}
      .favPick{
        display:grid;
        grid-template-columns:1fr;
        gap:6px;
        margin:8px 0 16px;
      }
      .checkRow{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        border:1px solid rgba(255,255,255,.10);
        background:rgba(255,255,255,.035);
        border-radius:8px;
        padding:9px 10px;
      }
      .checkRow span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      @media(max-width:1180px){
        .quick,.clock,.fav,.status{grid-column:span 12}
        .clock{min-height:0}
        .clockFace{min-height:0}
      }
      @media(max-width:760px){
        .top{height:auto;grid-template-columns:1fr auto;padding:12px}
        .brand{justify-content:flex-start;order:1}
        .title{font-size:28px}
        .brand img{width:34px;height:34px}
        .sub{order:2}
        #openCfg{order:3;grid-column:1 / -1;justify-self:stretch}
        .main{width:calc(100vw - 20px);padding-bottom:16px}
        .tiles{grid-template-columns:repeat(2,minmax(0,1fr))}
        .tile{min-height:112px}
        .time{font-size:58px}
        .status-list,.miniStats{grid-template-columns:1fr}
      }
    </style>
  </head>
  <body>
    <div id="bgPhoto" class="bg-photo"></div>
    <div class="veil"></div>

    <header class="top">
      <button id="openCfg" class="btn">Personalizza</button>
      <div class="brand">
        <img src="static/e-face-nobg.png" alt="" />
        <div class="title">Home+</div>
      </div>
      <div class="sub" id="connState"><span class="dot"></span><span>loading</span></div>
    </header>

    <main class="main">
      <section id="widgets" class="widgets"></section>
    </main>

    <aside id="panel" class="panel" aria-label="Pannello personalizzazione">
      <div class="panelTop">
        <h3>Home+ Config</h3>
        <button id="closeCfg" class="btn">Chiudi</button>
      </div>
      <div class="row"><span>Background URL</span><input id="bgUrl" type="text" placeholder="https://..." /></div>
      <div class="row"><span>Colonne menu</span><input id="cols" type="number" min="2" max="7" /></div>
      <div class="row"><span>Mostra Menu</span><input id="wQuick" type="checkbox" /></div>
      <div class="row"><span>Mostra Orologio</span><input id="wClock" type="checkbox" /></div>
      <div class="row"><span>Mostra Preferiti</span><input id="wFav" type="checkbox" /></div>
      <div class="row"><span>Mostra Stato</span><input id="wStatus" type="checkbox" /></div>
      <h3>Preferiti</h3>
      <div id="favBox" class="favPick"></div>
      <h3>Ordine Widget</h3>
      <div id="orderBox"></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="saveCfg" class="btn">Salva</button>
        <button id="resetCfg" class="btn">Reset</button>
      </div>
    </aside>

    <script>
      const PREF_KEY = 'ekonex_home_plus_v2';
      const defaults = {
        bgUrl: '',
        cols: 5,
        showQuick: true,
        showClock: true,
        showFav: true,
        showStatus: true,
        order: ['clock', 'quick', 'fav', 'status'],
        favIds: []
      };
      let lastMenuItems = [];

      function absUrl(path){ return new URL(path, window.location.href).toString(); }
      async function getJson(path){
        const url = absUrl(path);
        const opts = { cache: 'no-store' };
        const r = await (window.busproFetchWithTimeout ? window.busproFetchWithTimeout(url, opts, 12000) : fetch(url, opts));
        if (!r.ok) throw new Error(await r.text());
        return r.json();
      }
      function loadPrefs(){
        try{
          const raw = localStorage.getItem(PREF_KEY) || localStorage.getItem('ekonex_home_plus_v1');
          if(!raw) return { ...defaults };
          const p = { ...defaults, ...JSON.parse(raw) };
          p.order = Array.isArray(p.order) ? p.order : defaults.order.slice();
          p.order = p.order.filter(x => defaults.order.includes(x));
          defaults.order.forEach(x => { if (!p.order.includes(x)) p.order.push(x); });
          p.favIds = Array.isArray(p.favIds) ? p.favIds : [];
          return p;
        }catch(_){ return { ...defaults }; }
      }
      function savePrefs(p){ localStorage.setItem(PREF_KEY, JSON.stringify(p)); }
      function itemId(it){ return String(it.id || it.title || it.url || 'item'); }
      function mdiName(iconValue, fallback){
        const v = iconValue == null ? '' : String(iconValue).trim();
        const m = /^mdi:([a-z0-9_-]+)$/i.exec(v);
        return m ? m[1].toLowerCase() : (fallback || 'link-variant');
      }
      function iconUrl(iconValue, fallback){
        return absUrl(`api/icons/mdi/${mdiName(iconValue, fallback)}.svg`);
      }
      function tileEl(it){
        const a = document.createElement('a');
        a.className = 'tile';
        a.href = String(it.url || '#');
        if (it.new_tab) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
        const i = document.createElement('div');
        i.className = 'ico';
        i.style.webkitMaskImage = `url("${iconUrl(it.icon, 'link-variant')}")`;
        i.style.maskImage = `url("${iconUrl(it.icon, 'link-variant')}")`;
        const l = document.createElement('div');
        l.className = 'lbl';
        l.textContent = String(it.title || 'Link');
        a.append(i,l);
        return a;
      }
      function fmtDate(d){
        return d.toLocaleDateString('it-IT', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
      }
      function widgetWrap(id, title, cls){
        const w = document.createElement('section');
        w.className = `widget ${cls}`;
        w.dataset.wid = id;
        w.innerHTML = `<div class="w-head"><span>${title}</span></div><div class="w-body"></div>`;
        return w;
      }
      function setConn(ok){
        const conn = document.getElementById('connState');
        conn.classList.toggle('online', !!ok);
        conn.classList.toggle('offline', !ok);
        conn.querySelector('span:last-child').textContent = ok ? 'online' : 'offline';
      }
      function buildMenu(meta){
        const links = (meta && Array.isArray(meta.hub_links)) ? meta.hub_links : [];
        const actions = (meta && Array.isArray(meta.home_actions)) ? meta.home_actions : [];
        const hubShow = (meta && meta.hub_show && typeof meta.hub_show === 'object') ? meta.hub_show : {};
        const hubIcons = (meta && meta.hub_icons && typeof meta.hub_icons === 'object') ? meta.hub_icons : {};
        const builtins = [];
        if (hubShow.lights !== false) builtins.push({ id:'builtin_lights', title:'Luci', url:'/lights', icon:String(hubIcons.lights || 'mdi:lightbulb-group') });
        if (hubShow.scenarios !== false) builtins.push({ id:'builtin_scenarios', title:'Scenari', url:'/scenarios', icon:String(hubIcons.scenarios || 'mdi:star') });
        if (hubShow.covers !== false) builtins.push({ id:'builtin_covers', title:'Cover', url:'/covers', icon:String(hubIcons.covers || 'mdi:window-shutter') });
        if (hubShow.locks !== false) builtins.push({ id:'builtin_locks', title:'Lock', url:'/locks', icon:String(hubIcons.locks || 'mdi:lock-smart') });
        if (hubShow.extra !== false) builtins.push({ id:'builtin_extra', title:'Extra', url:'/extra', icon:String(hubIcons.extra || 'mdi:shape') });
        if (hubShow.guard !== false) builtins.push({ id:'builtin_guard', title:'Guard', url:'/e-guard', icon:String(hubIcons.guard || 'mdi:cctv') });
        return [...builtins, ...actions, ...links].filter(x => x && x.title && x.url);
      }
      function snapshotStats(snapshot){
        const devices = snapshot && Array.isArray(snapshot.devices) ? snapshot.devices : [];
        const states = snapshot && snapshot.states && typeof snapshot.states === 'object' ? snapshot.states : {};
        const coverStates = snapshot && snapshot.cover_states && typeof snapshot.cover_states === 'object' ? snapshot.cover_states : {};
        const lights = devices.filter(d => String(d.type || '').toLowerCase() === 'light');
        const covers = devices.filter(d => String(d.type || '').toLowerCase() === 'cover');
        let lightsOn = 0;
        lights.forEach(d => {
          const key = `${d.subnet_id}.${d.device_id}.${d.channel}`;
          const st = states[key] || {};
          if (String(st.state || '').toUpperCase() === 'ON') lightsOn += 1;
        });
        let coversOpen = 0;
        covers.forEach(d => {
          const key = `${d.subnet_id}.${d.device_id}.${d.channel}`;
          const st = coverStates[key] || {};
          const s = String(st.state || '').toUpperCase();
          if (s && s !== 'CLOSED') coversOpen += 1;
        });
        return { lights: lights.length, lightsOn, covers: covers.length, coversOpen };
      }

      async function render(){
        const prefs = loadPrefs();
        const widgets = document.getElementById('widgets');
        widgets.innerHTML = '';
        document.documentElement.style.setProperty('--cols', String(Math.max(2, Math.min(7, Number(prefs.cols)||5))));
        document.getElementById('bgPhoto').style.backgroundImage = prefs.bgUrl ? `url("${prefs.bgUrl}")` : 'url("static/logo_ekonex.png")';

        let meta = null;
        let snapshot = null;
        try { meta = await getJson('api/meta'); } catch(_){}
        try { snapshot = await getJson('api/user/snapshot'); } catch(_){}
        setConn(!!meta);

        const all = buildMenu(meta);
        lastMenuItems = all;
        const byId = new Map(all.map(x => [itemId(x), x]));
        const fav = (prefs.favIds || []).map(id => byId.get(String(id))).filter(Boolean);
        const links = (meta && Array.isArray(meta.hub_links)) ? meta.hub_links : [];
        const actions = (meta && Array.isArray(meta.home_actions)) ? meta.home_actions : [];
        const stats = snapshotStats(snapshot);
        const enabled = {
          quick: !!prefs.showQuick,
          clock: !!prefs.showClock,
          fav: !!prefs.showFav && fav.length > 0,
          status: !!prefs.showStatus
        };
        const order = (prefs.order || defaults.order).filter(x => ['quick','clock','fav','status'].includes(x));

        for (const id of order){
          if (!enabled[id]) continue;
          if (id === 'clock'){
            const w = widgetWrap('clock', 'Tempo', 'clock');
            const body = w.querySelector('.w-body');
            body.innerHTML = `<div class="clockFace">
              <div>
                <div class="time" id="liveTime">--:--</div>
                <div class="date" id="liveDate">--</div>
              </div>
              <div class="miniStats">
                <div class="mini"><b>${stats.lightsOn}</b><span>Luci on</span></div>
                <div class="mini"><b>${stats.coversOpen}</b><span>Cover aperte</span></div>
                <div class="mini"><b>${all.length}</b><span>Comandi</span></div>
              </div>
            </div>`;
            widgets.appendChild(w);
          }
          if (id === 'quick'){
            const w = widgetWrap('quick', 'Menu', 'quick');
            const body = w.querySelector('.w-body');
            const grid = document.createElement('div');
            grid.className = 'tiles';
            all.forEach(it => grid.appendChild(tileEl(it)));
            body.appendChild(grid);
            widgets.appendChild(w);
          }
          if (id === 'fav'){
            const w = widgetWrap('fav', 'Preferiti', 'fav');
            const body = w.querySelector('.w-body');
            const grid = document.createElement('div');
            grid.className = 'tiles';
            fav.forEach(it => grid.appendChild(tileEl(it)));
            body.appendChild(grid);
            widgets.appendChild(w);
          }
          if (id === 'status'){
            const w = widgetWrap('status', 'Sistema', 'status');
            const body = w.querySelector('.w-body');
            const ver = meta && meta.version ? String(meta.version) : '-';
            body.innerHTML = `<div class="status-list">
              <div class="status-item"><span>Versione</span><strong>${ver}</strong></div>
              <div class="status-item"><span>Luci</span><strong>${stats.lights}</strong></div>
              <div class="status-item"><span>Cover</span><strong>${stats.covers}</strong></div>
              <div class="status-item"><span>Proxy</span><strong>${links.length}</strong></div>
              <div class="status-item"><span>Azioni</span><strong>${actions.length}</strong></div>
              <div class="status-item"><span>Gesture</span><strong>${meta && meta.back_gesture_enabled === false ? 'off' : 'on'}</strong></div>
            </div>`;
            widgets.appendChild(w);
          }
        }

        function tick(){
          const d = new Date();
          const t = document.getElementById('liveTime');
          const dt = document.getElementById('liveDate');
          if (t) t.textContent = d.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit' });
          if (dt) dt.textContent = fmtDate(d);
        }
        tick();
        clearInterval(window.__homePlusClock);
        window.__homePlusClock = setInterval(tick, 1000);
        renderFavEditor(loadPrefs());
      }

      function renderOrderEditor(p){
        const box = document.getElementById('orderBox');
        box.innerHTML = '';
        const map = {quick:'Menu', clock:'Orologio', fav:'Preferiti', status:'Stato'};
        p.order.forEach((id, idx) => {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `<span>${map[id] || id}</span>`;
          const ord = document.createElement('div');
          ord.className = 'ord';
          const up = document.createElement('button'); up.className='btn'; up.textContent='Su';
          const dn = document.createElement('button'); dn.className='btn'; dn.textContent='Giu';
          up.onclick = ()=>{ if(idx<1)return; [p.order[idx-1], p.order[idx]]=[p.order[idx], p.order[idx-1]]; renderOrderEditor(p); };
          dn.onclick = ()=>{ if(idx>=p.order.length-1)return; [p.order[idx+1], p.order[idx]]=[p.order[idx], p.order[idx+1]]; renderOrderEditor(p); };
          ord.append(up,dn); row.appendChild(ord); box.appendChild(row);
        });
      }
      function renderFavEditor(p){
        const box = document.getElementById('favBox');
        if (!box) return;
        box.innerHTML = '';
        if (!lastMenuItems.length) {
          const empty = document.createElement('div');
          empty.className = 'checkRow';
          empty.textContent = 'Nessun link disponibile';
          box.appendChild(empty);
          return;
        }
        const selected = new Set((p.favIds || []).map(String));
        lastMenuItems.forEach(it => {
          const id = itemId(it);
          const label = document.createElement('label');
          label.className = 'checkRow';
          const span = document.createElement('span');
          span.textContent = String(it.title || id);
          const input = document.createElement('input');
          input.type = 'checkbox';
          input.value = id;
          input.checked = selected.has(id);
          label.append(span,input);
          box.appendChild(label);
        });
      }

      function bindConfig(){
        const panel = document.getElementById('panel');
        const p = loadPrefs();
        document.getElementById('openCfg').onclick = ()=>{ panel.classList.add('show'); renderFavEditor(loadPrefs()); };
        document.getElementById('closeCfg').onclick = ()=>{ panel.classList.remove('show'); };
        document.getElementById('bgUrl').value = p.bgUrl || '';
        document.getElementById('cols').value = String(p.cols || 5);
        document.getElementById('wQuick').checked = !!p.showQuick;
        document.getElementById('wClock').checked = !!p.showClock;
        document.getElementById('wFav').checked = !!p.showFav;
        document.getElementById('wStatus').checked = !!p.showStatus;
        renderOrderEditor(p);
        renderFavEditor(p);

        document.getElementById('saveCfg').onclick = async ()=>{
          p.bgUrl = document.getElementById('bgUrl').value.trim();
          p.cols = Number(document.getElementById('cols').value || 5);
          p.showQuick = document.getElementById('wQuick').checked;
          p.showClock = document.getElementById('wClock').checked;
          p.showFav = document.getElementById('wFav').checked;
          p.showStatus = document.getElementById('wStatus').checked;
          p.favIds = Array.from(document.querySelectorAll('#favBox input[type="checkbox"]:checked')).map(x => x.value);
          savePrefs(p);
          panel.classList.remove('show');
          await render();
        };
        document.getElementById('resetCfg').onclick = async ()=>{
          savePrefs({ ...defaults });
          panel.classList.remove('show');
          bindConfig();
          await render();
        };
      }

      bindConfig();
      render();
    </script>
  </body>
</html>
