            for (const it of (editingScenarioItems || [])) {
              if (addrFromItem(it) !== addr) continue;
              it.state = 'ON';
              it.brightness = v;
              break;
            }
            renderScenarioEditorItems();
          });
        });

        if (err) err.textContent = '';
        restoreScenarioScroll(scScroll);
      }

      function renderScenarioAddList() {
        const scScroll = captureScenarioScroll();
        const root = qs('scAddList');
        if (!root) return;
        root.replaceChildren();
        const search = String((qs('scAddSearch') && qs('scAddSearch').value) || '').trim().toLowerCase();
        const groupSel = selectedScenarioGroupKey();
        const devMap = deviceByAddrLookup();
        const existing = new Set((editingScenarioItems || []).map(addrFromItem));
        const all = Array.from(devMap.entries())
          .map(([addr, d]) => ({ addr, d }))
          .filter(({addr, d}) => !existing.has(addr))
          .filter(({addr, d}) => {
            if (!groupSel || groupSel === '__all__') return true;
            return groupKeyFromGroup(d.group) === groupSel;
          })
          .filter(({addr, d}) => {
            if (!search) return true;
            const name = String((d && d.name) || '').toLowerCase();
            return addr.toLowerCase().includes(search) || name.includes(search);
          })
          .sort((a,b) => String(a.d.name||a.addr).localeCompare(String(b.d.name||b.addr), undefined, {sensitivity:'base'}));

        if (!all.length) {
          const empty = document.createElement('div');
          empty.className = 'scAddRow';
          empty.innerHTML = `<div class="scAddName">Nessuna luce da aggiungere</div><div class="scAddMeta">usa la ricerca</div>`;
          root.appendChild(empty);
          restoreScenarioScroll(scScroll);
          return;
        }
        for (const { addr, d } of all) {
          const row = document.createElement('div');
          row.className = 'scAddRow';
          row.setAttribute('data-addr', addr);
          const meta = d.dimmable ? 'dimmer' : 'on/off';
          row.innerHTML = `<div class="scAddName">${escapeHtml(String(d.name||addr))}</div><div class="scAddMeta">${escapeHtml(addr)} \u2022 ${escapeHtml(meta)}</div>`;
          row.addEventListener('click', () => {
            animatePress(row);
            const it = (String(d.origin || '') === 'ha')
              ? { entity_id: String(d.entity_id || addr), domain: String(d.domain || 'light'), state: 'ON', brightness: d.dimmable ? 255 : null }
              : { subnet_id: Number(d.subnet_id), device_id: Number(d.device_id), channel: Number(d.channel), state: 'ON', brightness: d.dimmable ? 255 : null };
            editingScenarioItems = (editingScenarioItems || []).concat([it]);
            renderScenarioEditorItems();
            renderScenarioAddList();
          });
          root.appendChild(row);
        }
        restoreScenarioScroll(scScroll);
      }

      async function saveScenarioEdits() {
        const err = qs('scErr');
        try {
          if (err) err.textContent = '';
          const sid = String(editingScenarioId || '').trim();
          if (!sid) return;
          const nameInput = qs('scNameInput');
          const name = String((nameInput && nameInput.value) || '').trim();
          if (!name) {
            if (err) err.textContent = 'Nome scenario obbligatorio';
            return;
          }
          const flags = getScenarioFlags();
          if (!flags.run_enabled && !flags.onoff_enabled) {
            if (err) err.textContent = 'Seleziona RUN o ON/OFF';
            return;
          }
          const trigger = getScenarioTrigger();
          const haTrigger = getScenarioHaTrigger();
          const items = (editingScenarioItems || []).map((it) => {
            const st = String(it.state || 'ON').toUpperCase() === 'OFF' ? 'OFF' : 'ON';
            let br = it.brightness;
            if (st === 'OFF') br = null;
            if (br === null || br === undefined) br = null;
            else br = Math.max(0, Math.min(255, Number(br)));
            if (it && it.entity_id) {
              const eid = String(it.entity_id || '').trim();
              const dom = String(it.domain || (eid.split('.',1)[0]||'light')).trim().toLowerCase();
              return { entity_id: eid, domain: dom, state: st, brightness: br };
            }
            return { subnet_id: Number(it.subnet_id), device_id: Number(it.device_id), channel: Number(it.channel), state: st, brightness: br };
          });
          const covers = (editingScenarioCovers || []).map((it) => {
            const kindRaw = String(it.kind || 'single');
            const kind = kindRaw === 'group' ? 'group' : (kindRaw === 'ha' ? 'ha' : 'single');
            const cmd = String(it.command || '').toUpperCase();
            const ramp_minutes = Math.max(0, Math.min(240, Number(it.ramp_minutes ?? 0) || 0));
            const step_seconds = Math.max(1, Math.min(120, Number(it.step_seconds ?? 5) || 5));
            const two_phase_open = !!it.two_phase_open;
            const phase1_pct = Math.max(1, Math.min(99, Number(it.phase1_pct ?? 25) || 25));
            const phase2_delay_minutes = Math.max(0, Math.min(240, Number(it.phase2_delay_minutes ?? 4) || 4));
            if (kind === 'group') {
              return { kind: 'group', group_id: String(it.group_id || '').trim(), command: cmd, position: null, ramp_minutes, step_seconds, two_phase_open, phase1_pct, phase2_delay_minutes };
            }
            if (kind === 'ha') {
              return { kind: 'ha', entity_id: String(it.entity_id || '').trim().toLowerCase(), command: cmd, position: null, ramp_minutes, step_seconds, two_phase_open, phase1_pct, phase2_delay_minutes };
            }
            return {
              kind: 'single',
              subnet_id: Number(it.subnet_id),
              device_id: Number(it.device_id),
              channel: Number(it.channel),
              command: cmd,
              position: null,
              ramp_minutes,
              step_seconds,
              two_phase_open,
              phase1_pct,
              phase2_delay_minutes,
            };
          });
          if (!items.length && !covers.length) {
            if (err) err.textContent = 'Aggiungi almeno una luce o una tapparella';
            return;
          }
          if (sid === '__new__') {
            await getJson('api/user/light_scenarios', {
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify({ name, items, covers, run_enabled: flags.run_enabled, onoff_enabled: flags.onoff_enabled, trigger, ha_trigger_enabled: haTrigger.ha_trigger_enabled, ha_trigger_id: haTrigger.ha_trigger_id }),
            });
          } else {
            await getJson(`api/user/light_scenarios/${encodeURIComponent(sid)}`, {
              method:'PUT',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify({ name, items, covers, run_enabled: flags.run_enabled, onoff_enabled: flags.onoff_enabled, trigger, ha_trigger_enabled: haTrigger.ha_trigger_enabled, ha_trigger_id: haTrigger.ha_trigger_id }),
            });
          }
          await loadLightScenarios();
          closeScenarioEditor();
        } catch (e) {
          if (err) err.textContent = 'Errore salvataggio modifiche';
        }
      }

      function buildScenarioItems({ onlyOn, onlyOff }) {
        const items = [];
        const groupSel = selectedScenarioGroupKey();
        const lights = (lastDevices || []).filter(isLightListDevice);
        for (const d of lights) {
          if (groupSel && groupSel !== '__all__' && groupKeyFromGroup(d.group) !== groupSel) continue;
          const addr = addrOf(d);
          const st = stateByAddr.get(addr) || { state:'?', brightness:0 };
          const on = String(st.state || '').toUpperCase() === 'ON';
          if (onlyOn && !on) continue;
          if (onlyOff && on) continue;
          const it = { subnet_id: Number(d.subnet_id), device_id: Number(d.device_id), channel: Number(d.channel), state: on ? 'ON' : 'OFF' };
          if (on && d.dimmable) {
            const b = Number(st.brightness ?? 0);
            const b255 = Math.max(1, Math.min(255, Number.isFinite(b) ? b : (lastBrightness.get(addr) || 255)));
            it.brightness = b255;
          }
          items.push(it);
        }
        return items;
      }

      async function saveScenario({ onlyOn, onlyOff }) {
        const err = qs('scErr');
        try {
          if (err) err.textContent = '';
          const name = await askScenarioName();
          if (!name) return;
          const flags = getScenarioFlags();
          if (!flags.run_enabled && !flags.onoff_enabled) {
            if (err) err.textContent = 'Seleziona RUN o ON/OFF';
            return;
          }
          const items = buildScenarioItems({ onlyOn, onlyOff });
          if (!items.length) {
            if (err) err.textContent = 'Nessuna luce da salvare';
            return;
          }
          await getJson('api/user/light_scenarios', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ name, items, run_enabled: flags.run_enabled, onoff_enabled: flags.onoff_enabled }),
          });
          await loadLightScenarios();
        } catch (e) {
          if (err) err.textContent = 'Errore salvataggio scenario';
        }
      }

      function openScenarios() {
        const back = qs('scenesModalBack');
        if (!back) return;
        back.classList.add('show');
        ensureScenarioGroupSelect();
        loadLightScenarios().catch(() => {});
      }
      function closeScenarios() {
        const back = qs('scenesModalBack');
        if (!back) return;
        back.classList.remove('show');
        closeScenarioEditor();
      }

      function mdiName(iconValue) {
        const v = (iconValue === null || iconValue === undefined) ? '' : String(iconValue).trim();
        const m = /^mdi:([a-z0-9_-]+)$/i.exec(v);
        return m ? m[1].toLowerCase() : 'lightbulb';
      }
      function iconUrl(iconValue) {
        const name = mdiName(iconValue);
        return absUrl(`api/icons/mdi/${name}.svg`);
      }
      function normalizeGroup(v) { 
        const s = (v === null || v === undefined) ? '' : String(v).trim(); 
        if (!s) return ''; 
        return s.startsWith('#') ? s.slice(1).trim() : s; 
      } 
      function groupIndex(groupName) { 
        const key = normalizeGroup(groupName).toLowerCase(); 
        if (!key) return 1e9; 
        for (let i = 0; i < groupOrder.length; i++) { 
          if (String(groupOrder[i] || '').toLowerCase() === key) return i; 
        } 
        return 1e8; 
      } 

      function isExtraSwitch(d) {
        const t = String(d.type || 'light').toLowerCase();
        if (t !== 'light') return false;
        const cat = String(d.category || '').trim().toLowerCase();
        return cat === 'switch' || cat === 'extra';
      }

      function isLightListDevice(d) {
        if (String(d.type || 'light').toLowerCase() !== 'light') return false;
        if (String(d.origin || '') === 'ha') return String(d.page || 'lights') === 'lights';
        return !isExtraSwitch(d);
      }

      function isScenarioListDevice(d) {
        if (String(d.type || 'light').toLowerCase() !== 'light') return false;
        if (String(d.origin || '') === 'ha') {
          const page = String(d.page || 'lights').toLowerCase();
          return page === 'lights' || page === 'extra';
        }
        // For scenario editing include all BusPro light outputs, even if categorized
        // as Switch/Extra for list-page purposes.
        return true;
      }

      function isActiveLight(d) {
        const addr = addrOf(d);
        const st = stateByAddr.get(addr);
        return st && String(st.state || '').toUpperCase() === 'ON';
      }

      function isActiveState(st) {
        return !!(st && String(st.state || '').toUpperCase() === 'ON');
      }

      function applyScenarioStateEvent(ev) {
        if (!ev) return;
        const id = String(ev.id || '').trim();
        const st = String(ev.state || '').trim().toUpperCase();
        if (!id || (st !== 'ON' && st !== 'OFF')) return;
        scenarioStates = scenarioStates && typeof scenarioStates === 'object' ? scenarioStates : {};
        scenarioStates[id] = st;
        // While editing a scenario, avoid forcing list re-render that can hide the editor panel.
        if (String(editingScenarioId || '').trim()) return;
        try { renderLightScenarios(); } catch (e) {}
      }

      function applyScenarioRunningEvent(ev) {
        if (!ev) return;
        const id = String(ev.id || '').trim();
        if (!id) return;
        scenarioRunning = scenarioRunning && typeof scenarioRunning === 'object' ? scenarioRunning : {};
        scenarioRunning[id] = !!ev.running;
        if (String(editingScenarioId || '').trim()) return;
        try { renderLightScenarios(); } catch (e) {}
      }

      function refreshDeviceIndex() {
        deviceByAddr.clear();
        for (const d of (lastDevices || [])) {
          if (!isLightListDevice(d)) continue;
          deviceByAddr.set(addrOf(d), d);
        }
      }

      function applyLightStateToRow(addr) {
        const row = rowByAddr.get(addr) || document.querySelector(`.row[data-addr="${cssEscape(addr)}"]`);
        if (!row) return;
        const d = deviceByAddr.get(addr);
        const st = stateByAddr.get(addr) || { state: '?', brightness: 0 };
        const on = String(st.state || '').toUpperCase() === 'ON';
        const b = Number(st.brightness ?? 0);
        const b255 = Math.max(0, Math.min(255, Number.isFinite(b) ? b : 0));
        if (on && b255 > 0) lastBrightness.set(addr, Math.max(1, b255));
        const pct = on ? Math.round((Math.max(0, Math.min(255, b255)) * 100) / 255) : 0;

        row.classList.toggle('on', !!on);
        if (on) {
          const intensity = (d && d.dimmable) ? (Math.max(0, Math.min(100, pct)) / 100) : 1;
          row.style.setProperty('--int', String(intensity));
        } else {
          row.style.removeProperty('--int');
        }
        try {
          const bubble = row.querySelector('.bubble');
          if (bubble && bubble.style.display !== 'none') bubble.textContent = String(pct);
        } catch (e) {}
        try {
          const range = row.querySelector('input[type=\"range\"]');
          if (range) range.value = String(on ? Math.max(1, b255 || 255) : 1);
        } catch (e) {}
      }

      function queueCountsUpdate() {
        if (countsQueued) return;
        countsQueued = true;
        setTimeout(() => {
          countsQueued = false;
          try { updateSectionCounts(); } catch (e) {}
        }, 400);
      }

      function updateSectionCounts() {
        const allLights = (lastDevices || []).filter(isLightListDevice);
        const groupStats = new Map();
        for (const d of allLights) {
          const k = groupKeyFromGroup(d.group);
          const cur = groupStats.get(k) || { total: 0, active: 0 };
          cur.total += 1;
          const addr = addrOf(d);
          if (isActiveState(stateByAddr.get(addr))) cur.active += 1;
          groupStats.set(k, cur);
        }
        for (const [k, el] of sectionByGroup.entries()) {
          const st = groupStats.get(k) || { total: 0, active: 0 };
          const count = el.querySelector('.count');
          if (count) count.textContent = `${st.active}/${st.total}`;
        }
      }
 
      function render() { 
        const root = qs('list'); 
        root.replaceChildren();
        rowByAddr.clear();
        sectionByGroup.clear();
        refreshDeviceIndex();
 
        const allLights = lastDevices
          .filter(isLightListDevice)
          .slice();
        const lights = buildRgbDisplayItems(allLights)
          .filter((item) => {
            if (!showActiveOnly) return true;
            if (item.kind === 'rgb') return item.channels.some((ch) => isActiveLight(ch));
            return isActiveLight(item.d);
          });

        // Stats per group (active/total) computed on ALL lights (not filtered by showActiveOnly).
        const groupStats = new Map();
        for (const d of allLights) {
          const k = groupKeyFromGroup(d.group);
          const cur = groupStats.get(k) || { total: 0, active: 0 };
          cur.total += 1;
          if (isActiveLight(d)) cur.active += 1;
          groupStats.set(k, cur);
        }
        const knownGroups = Array.from(groupStats.keys());
        const allCollapsed = knownGroups.length > 0 && knownGroups.every((k) => collapsedGroups.has(k));
        qs('collapseBtn').classList.toggle('on', allCollapsed);
        setCollapseIcon(allCollapsed);
 
        let lastGroupKey = null; 
        for (const item of lights) { 
          const dForGroup = item.kind === 'rgb' ? { group: item.group } : item.d;
          const groupKey = groupKeyFromGroup(dForGroup.group);
          const label = groupLabelFromKey(groupKey);
          if (groupKey !== lastGroupKey) { 
            const sec = document.createElement('div'); 
            sec.className = 'section'; 
            sec.setAttribute('data-act', 'toggle-group');
            sec.setAttribute('data-group', groupKey);
            const st = groupStats.get(groupKey) || { total: 0, active: 0 };
            sec.innerHTML = `<span>${escapeHtml(label)}</span><span class="count">${escapeHtml(String(st.active))}/${escapeHtml(String(st.total))}</span>`;
            root.appendChild(sec); 
            sectionByGroup.set(groupKey, sec);
            lastGroupKey = groupKey; 
          } 
          if (collapsedGroups.has(groupKey)) continue;

          if (item.kind === 'rgb') {
            const g = item;
            const rgbState = getRgbState(g.key, g.channels);
            const active = g.channels.some((ch) => isActiveLight(ch));
            const master = Math.max(1, Math.min(255, Number(rgbState.master || 255)));
            const masterPct = active ? Math.round((master * 100) / 255) : 0;
            const currentHex = currentRgbHex(g, rgbState);
            const masterIntensity = Math.max(0, Math.min(1, masterPct / 100));
            const masterStyle = active
              ? `--int:${masterIntensity};--rgb-master-color:${escapeHtml(currentHex)};--rgb-master-bg:${escapeHtml(hexToRgba(currentHex, .08 + masterIntensity * .18))};--rgb-master-glow:${escapeHtml(hexToRgba(currentHex, .16 + masterIntensity * .34))}`
              : '';
            const groupEl = document.createElement('div');
            groupEl.className = 'rgbGroup';
            groupEl.setAttribute('data-rgb-group', g.key);
            const first = g.channels[0] || {};
            groupEl.innerHTML = `
              <div class="rgbMaster ${active ? 'on' : ''}" data-act="rgb-toggle" data-rgb-group="${escapeHtml(g.key)}" style="${masterStyle}">
                <span class="ico" aria-hidden="true"
                  style="-webkit-mask-image:url('${escapeHtml(iconUrl(first.icon || 'mdi:led-strip-variant'))}');mask-image:url('${escapeHtml(iconUrl(first.icon || 'mdi:led-strip-variant'))}')"></span>
                <div class="content">
                  <div class="rgbMasterHead">
                    <div class="name">${escapeHtml(g.name || 'RGB')}</div>
                    <button class="rgbPaletteBtn ${openRgbPalettes.has(g.key) ? 'open' : ''}" type="button" data-act="rgb-palette-toggle" data-rgb-group="${escapeHtml(g.key)}" aria-label="Apri tavola colori"></button>
                  </div>
                  <div class="ctrl">
                    <span class="bubble">${escapeHtml(String(masterPct))}</span>
                    <input type="range" min="1" max="255" value="${String(master)}" data-act="rgb-master" data-rgb-group="${escapeHtml(g.key)}" />
                  </div>
                </div>
              </div>
              <div class="rgbPalette ${openRgbPalettes.has(g.key) ? 'open' : ''}" data-rgb-palette="${escapeHtml(g.key)}" style="--rgb-preview:${escapeHtml(currentHex)}">
                <div class="rgbPalettePreview"></div>
                <div class="rgbWheelWrap">
                  <button class="rgbWheel" type="button" data-act="rgb-wheel" data-rgb-group="${escapeHtml(g.key)}" data-color="${escapeHtml(currentHex)}" aria-label="Ruota colore"></button>
                </div>
                <div class="rgbSwatches">
                  ${RGB_PRESETS.map((hex) => `<button class="rgbSwatch" type="button" data-act="rgb-swatch" data-rgb-group="${escapeHtml(g.key)}" data-color="${escapeHtml(hex)}" style="--swatch:${escapeHtml(hex)}" aria-label="${escapeHtml(hex)}"></button>`).join('')}
                </div>
                <div class="rgbCustom">
                  <input type="color" value="${escapeHtml(currentHex)}" data-act="rgb-color" data-rgb-group="${escapeHtml(g.key)}" aria-label="Colore personalizzato" />
                  <span class="bubble">${escapeHtml(currentHex.toUpperCase())}</span>
                </div>
              </div>
              <div class="rgbSlaves" style="${active ? '' : 'display:none'}"></div>
            `;
            const slavesEl = groupEl.querySelector('.rgbSlaves');
            for (const chDev of g.channels) {
              const addr = addrOf(chDev);
              const ch = rgbChannelOf(chDev);
              const slave = Math.max(0, Math.min(255, Number(rgbState.slaves[addr] || 0)));
              const slavePct = Math.round((slave * 100) / 255);
              const slaveIntensity = Math.max(0, Math.min(1, slavePct / 100));
              const slaveOn = slave > 0;
              const slaveEl = document.createElement('div');
              slaveEl.className = `rgbSlave ${slaveOn ? 'on' : ''}`;
              slaveEl.setAttribute('data-addr', addr);
              slaveEl.style.setProperty('--rgb-bg', channelRgba(ch, .06 + slaveIntensity * .20));
              slaveEl.style.setProperty('--rgb-glow', channelRgba(ch, .10 + slaveIntensity * .34));
              slaveEl.style.setProperty('--rgb-border', channelRgba(ch, .22 + slaveIntensity * .38));
              slaveEl.innerHTML = `
                <span class="rgbDot" style="--rgb:${escapeHtml(channelColor(ch))}" aria-hidden="true"></span>
                <div class="content">
                  <div class="name">${escapeHtml(chDev.name || channelLabel(ch))}</div>
                  <div class="ctrl">
                    <span class="bubble">${escapeHtml(String(slavePct))}</span>
                    <input type="range" min="0" max="255" value="${String(slave)}" data-act="rgb-slave" data-rgb-group="${escapeHtml(g.key)}" data-addr="${escapeHtml(addr)}" />
                  </div>
                </div>
              `;
              slavesEl.appendChild(slaveEl);
              activeByAddr.set(addr, isActiveLight(chDev));
            }
            root.appendChild(groupEl);
            continue;
          }

          const d = item.d;
          const addr = addrOf(d);
          const st = stateByAddr.get(addr) || { state:'?', brightness:0 };
          const on = String(st.state || '').toUpperCase() === 'ON';
          const b = Number(st.brightness ?? 0);
          if (on && Number.isFinite(b) && b > 0) lastBrightness.set(addr, Math.max(1, Math.min(255, b)));
          const pct = on ? Math.round((Math.max(0,Math.min(255,b)) * 100) / 255) : 0;

          const row = document.createElement('div');
          row.className = `row ${on ? 'on' : ''}`;
          if (on) {
            const intensity = d.dimmable ? (Math.max(0, Math.min(100, pct)) / 100) : 1;
            row.style.setProperty('--int', String(intensity));
          }

          row.setAttribute('data-act', 'toggle');
          row.setAttribute('data-addr', addr);

          row.innerHTML = `
            <span class="ico" aria-hidden="true"
              style="-webkit-mask-image:url('${escapeHtml(iconUrl(d.icon))}');mask-image:url('${escapeHtml(iconUrl(d.icon))}')"></span>
            <div class="content">
              <div class="name" data-act="toggle" data-addr="${escapeHtml(addr)}">${escapeHtml(d.name || '')}</div>
              ${d.dimmable ? `
                <div class="ctrl">
                  <span class="bubble">${escapeHtml(String(pct))}</span>
                  <input type="range" min="1" max="255" value="${on ? String(Math.max(1,Math.min(255,b||255))) : '1'}" data-act="br" data-addr="${escapeHtml(addr)}" />
                </div>
              ` : `
                <div class="ctrl">
                  <span class="bubble" style="display:none"></span>
                </div>
              `}
            </div>
          `;
          root.appendChild(row);
          rowByAddr.set(addr, row);
          activeByAddr.set(addr, isActiveLight(d));
        }

        // Group collapse toggle
        root.querySelectorAll('.section[data-act="toggle-group"]').forEach((el) => {
          el.addEventListener('click', () => {
            const g = el.getAttribute('data-group') || GROUP_NONE;
            if (collapsedGroups.has(g)) collapsedGroups.delete(g);
            else collapsedGroups.add(g);
            try { localStorage.setItem(LS_COLLAPSED, JSON.stringify(Array.from(collapsedGroups))); } catch (e) {}
            queueRender();
          });
        });

        root.querySelectorAll('[data-act="rgb-toggle"]').forEach((el) => {
          el.addEventListener('click', async (evt) => {
            const t = evt && evt.target;
            if (t && t.tagName && String(t.tagName).toLowerCase() === 'input') return;
            if (t && t.closest && t.closest('[data-act="rgb-palette-toggle"]')) return;
            const key = el.getAttribute('data-rgb-group') || '';
            const group = lights.find((it) => it.kind === 'rgb' && it.key === key);
            if (!group) return;
            animatePress(el);
            qs('err').textContent = '';
            try {
              const active = group.channels.some((ch) => isActiveLight(ch));
              if (active) {
                for (const chDev of group.channels) await sendRgbLight(chDev, addrOf(chDev), 'OFF');
              } else {
                const rgbState = getRgbState(key, group.channels);
                for (const chDev of group.channels) {
                  const addr = addrOf(chDev);
                  await sendRgbLight(chDev, addr, 'ON', rgbEffectiveBrightness(rgbState.slaves[addr], rgbState.master));
                }
              }
            } catch (e) { qs('err').textContent = e.message || String(e); }
          });
        });

        root.querySelectorAll('[data-act="rgb-palette-toggle"]').forEach((el) => {
          el.addEventListener('click', (evt) => {
            try { evt.preventDefault(); evt.stopPropagation(); } catch(e){}
            const key = el.getAttribute('data-rgb-group') || '';
            if (!key) return;
            if (openRgbPalettes.has(key)) openRgbPalettes.delete(key);
            else openRgbPalettes.add(key);
            queueRender();
          });
        });

        root.querySelectorAll('[data-act="rgb-swatch"]').forEach((el) => {
          el.addEventListener('click', async (evt) => {
            try { evt.preventDefault(); evt.stopPropagation(); } catch(e){}
            const key = el.getAttribute('data-rgb-group') || '';
            const group = lights.find((it) => it.kind === 'rgb' && it.key === key);
            if (!group) return;
            qs('err').textContent = '';
            try { await applyRgbColor(group, el.getAttribute('data-color') || '#ffffff'); } catch (e) { qs('err').textContent = e.message || String(e); }
          });
        });

        root.querySelectorAll('[data-act="rgb-wheel"]').forEach((el) => {
          let dragging = false;
          let pendingColor = String(el.getAttribute('data-color') || '#ffffff');
          function preview(evt) {
            const picked = wheelEventToColor(el, evt);
            pendingColor = picked.hex;
            el.style.setProperty('--wheel-x', `${picked.xPct}%`);
            el.style.setProperty('--wheel-y', `${picked.yPct}%`);
            const panel = el.closest ? el.closest('.rgbPalette') : null;
            if (panel) panel.style.setProperty('--rgb-preview', pendingColor);
          }
          async function commit() {
            const key = el.getAttribute('data-rgb-group') || '';
            const group = lights.find((it) => it.kind === 'rgb' && it.key === key);
            if (!group) return;
            qs('err').textContent = '';
            try { await applyRgbColor(group, pendingColor); } catch (e) { qs('err').textContent = e.message || String(e); }
          }
          el.addEventListener('pointerdown', (evt) => {
            try { evt.preventDefault(); evt.stopPropagation(); el.setPointerCapture(evt.pointerId); } catch(e){}
            dragging = true;
            preview(evt);
          });
          el.addEventListener('pointermove', (evt) => {
            if (!dragging) return;
            try { evt.preventDefault(); evt.stopPropagation(); } catch(e){}
            preview(evt);
          });
          el.addEventListener('pointerup', async (evt) => {
            if (!dragging) return;
            try { evt.preventDefault(); evt.stopPropagation(); el.releasePointerCapture(evt.pointerId); } catch(e){}
            dragging = false;
            preview(evt);
            await commit();
          });
          el.addEventListener('pointercancel', () => { dragging = false; });
        });

        root.querySelectorAll('[data-act="rgb-color"]').forEach((el) => {
          el.addEventListener('click', (evt) => { try { evt.stopPropagation(); } catch(e){} });
          el.addEventListener('input', () => {
            const panel = el.closest ? el.closest('.rgbPalette') : null;
            if (panel) panel.style.setProperty('--rgb-preview', String(el.value || '#ffffff'));
            const bubble = el.parentElement && el.parentElement.querySelector ? el.parentElement.querySelector('.bubble') : null;
            if (bubble) bubble.textContent = String(el.value || '#ffffff').toUpperCase();
          });
          el.addEventListener('change', async () => {
            const key = el.getAttribute('data-rgb-group') || '';
            const group = lights.find((it) => it.kind === 'rgb' && it.key === key);
            if (!group) return;
            qs('err').textContent = '';
            try { await applyRgbColor(group, el.value || '#ffffff'); } catch (e) { qs('err').textContent = e.message || String(e); }
          });
        });

        root.querySelectorAll('[data-act="rgb-master"]').forEach((el) => {
          el.addEventListener('click', (evt) => { try { evt.stopPropagation(); } catch(e){} });
          el.addEventListener('input', () => {
            const v = Number(el.value || 1);
            const bubble = (el.parentElement && el.parentElement.querySelector) ? el.parentElement.querySelector('.bubble') : null;
            if (bubble) bubble.textContent = String(Math.round((Math.max(0, Math.min(255, v)) * 100) / 255));
          });
          el.addEventListener('change', async () => {
            const key = el.getAttribute('data-rgb-group') || '';
            const group = lights.find((it) => it.kind === 'rgb' && it.key === key);
            if (!group) return;
            qs('err').textContent = '';
            try {
              const rgbState = getRgbState(key, group.channels);
              rgbState.master = Math.max(1, Math.min(255, Number(el.value || 1)));
              saveRgbState(key, rgbState);
              for (const chDev of group.channels) {
                const addr = addrOf(chDev);
                await sendRgbLight(chDev, addr, 'ON', rgbEffectiveBrightness(rgbState.slaves[addr], rgbState.master));
              }
            } catch (e) { qs('err').textContent = e.message || String(e); }
          });
        });

        root.querySelectorAll('[data-act="rgb-slave"]').forEach((el) => {
          el.addEventListener('click', (evt) => { try { evt.stopPropagation(); } catch(e){} });
          el.addEventListener('input', () => {
            const v = Number(el.value || 1);
            const bubble = (el.parentElement && el.parentElement.querySelector) ? el.parentElement.querySelector('.bubble') : null;
            if (bubble) bubble.textContent = String(Math.round((Math.max(0, Math.min(255, v)) * 100) / 255));
          });
          el.addEventListener('change', async () => {
            const key = el.getAttribute('data-rgb-group') || '';
            const addr = el.getAttribute('data-addr') || '';
            const group = lights.find((it) => it.kind === 'rgb' && it.key === key);
            if (!group || !addr) return;
            const dev = deviceByAddr.get(addr);
            if (!dev) return;
            qs('err').textContent = '';
            try {
              const rgbState = getRgbState(key, group.channels);
              rgbState.slaves[addr] = Math.max(0, Math.min(255, Number(el.value || 0)));
              saveRgbState(key, rgbState);
              await sendRgbLight(dev, addr, 'ON', rgbEffectiveBrightness(rgbState.slaves[addr], rgbState.master));
            } catch (e) { qs('err').textContent = e.message || String(e); }
          });
        });

        // Toggle on whole row tap (not on slider)
        root.querySelectorAll('.row[data-act="toggle"]').forEach((el) => {
          el.addEventListener('click', async (evt) => {
            const t = evt && evt.target;
            if (t && t.tagName && String(t.tagName).toLowerCase() === 'input') return;
            animatePress(el);
            qs('err').textContent = '';
            const addr = el.getAttribute('data-addr');
            if (!addr) return;
            const dev = deviceByAddr.get(addr);
            if (!dev) return;
            try {
              const cur = stateByAddr.get(addr) || { state:'OFF', brightness:255 };
              const isOn = String(cur.state||'').toUpperCase() === 'ON';
              if (!isOn) {
                const remembered = Number(lastBrightness.get(addr) || 255);
                const use = Number.isFinite(remembered) && remembered > 1 ? remembered : 255;
                await sendLight(dev, addr, 'ON', use);
              } else {
                await sendLight(dev, addr, 'OFF');
              }
            } catch (e) { qs('err').textContent = e.message || String(e); }
          });
        });

        root.querySelectorAll('[data-act="br"]').forEach((el) => {
          el.addEventListener('click', (evt) => { try { evt.stopPropagation(); } catch(e){} });
          el.addEventListener('input', () => {
            const addr = el.getAttribute('data-addr');
            const v = Number(el.value || 1);
            lastBrightness.set(addr, v);
            const bubble = (el.parentElement && el.parentElement.querySelector) ? el.parentElement.querySelector('.bubble') : null;
            if (bubble) bubble.textContent = String(Math.round((Math.max(0, Math.min(255, v)) * 100) / 255));
          });
          el.addEventListener('change', async () => {
            qs('err').textContent = '';
            const addr = el.getAttribute('data-addr');
            const dev = deviceByAddr.get(addr);
            if (!dev) return;
            try { await sendLight(dev, addr, 'ON', Number(el.value || 1)); } catch (e) { qs('err').textContent = e.message || String(e); }
          });
        });

        queueCenter();
      }

      function queueCenter() {
        try { requestAnimationFrame(applyCenter); } catch(e) { applyCenter(); }
      }
      function applyCenter() {
        const main = document.querySelector('main');
        const list = qs('list');
        if (!main || !list) return;
        const padT = parseFloat(getComputedStyle(main).paddingTop || '0') || 0;
        const padB = parseFloat(getComputedStyle(main).paddingBottom || '0') || 0;
        const listH = list.getBoundingClientRect().height || 0;
        const avail = Math.max(0, window.innerHeight - padT - padB);
        main.classList.toggle('centerY', listH > 0 && listH < (avail - 40));
      }

      function wsUrl() {
        const u = new URL('ws', window.location.href);
        u.protocol = (location.protocol === 'https:') ? 'wss:' : 'ws:';
        return u.toString();
      }

      function applySnapshot(data) {
        const snap = data || {};
        lastDevices = snap.devices || [];
        refreshDeviceIndex();
        const states = snap.states || {};
        for (const [addr, st] of Object.entries(states)) {
          const state = String(st.state || '').toUpperCase() || '?';
          const brightness = (st.brightness === null || st.brightness === undefined) ? 0 : Number(st.brightness);
          stateByAddr.set(addr, { state, brightness });
        }
        const ha = snap.ha_states || {};
        if (ha && typeof ha === 'object') {
          for (const [eid, st] of Object.entries(ha)) {
            const s0 = (st && typeof st === 'object') ? st : {};
            const state = String(s0.state || '').toUpperCase() || '?';
            const brightness = (s0.brightness === null || s0.brightness === undefined) ? 0 : Number(s0.brightness);
            stateByAddr.set(String(eid), { state, brightness });
          }
        }
        syncRgbSlavesFromKnownStates();
        queueRender();
      }

      function startPolling() {
        async function tick() {
          try {
            applySnapshot(await getJson('api/user/snapshot', { cache:'no-store' }, 12000));
          } catch (e) {
            uiLog('poll_error', e && e.message ? e.message : String(e));
          }
        }
        tick();
        setInterval(tick, 3000);
      }

      function connectWs() {
        const ws = new WebSocket(wsUrl());
        ws.onopen = () => {};
        ws.onclose = (evt) => {
          if (!connectWs._reportedClose) {
            connectWs._reportedClose = true;
            uiLog('ws_close', `code=${evt && evt.code ? evt.code : 0}`);
          }
          setTimeout(connectWs, 1500);
        };
        ws.onerror = () => {
          if (!connectWs._reportedError) {
            connectWs._reportedError = true;
            uiLog('ws_error', 'websocket error');
          }
        };
        ws.onmessage = (evt) => {
          try {
            const msg = JSON.parse(evt.data);
            if (msg.type === 'snapshot') {
              applySnapshot(msg.data || {});
              return;
            }
            if (msg.type === 'devices') { 
              lastDevices = msg.data.devices || []; 
              refreshDeviceIndex();
              queueRender(); 
              return; 
            } 
            if (msg.type === 'ui') { 
              groupOrder = Array.isArray(msg.data && msg.data.group_order) ? msg.data.group_order.map(normalizeGroup).filter(Boolean) : groupOrder; 
              queueRender(); 
              return; 
            } 
            if (msg.type === 'light_state') { 
              const ev = msg.data || {}; 
              const addr = `${ev.subnet_id}.${ev.device_id}.${ev.channel}`; 
              const next = { state: ev.state, brightness: ev.brightness };
              stateByAddr.set(addr, next);
              const nowActive = isActiveState(next);
              const prevActive = activeByAddr.get(addr);
              activeByAddr.set(addr, nowActive);
              if (rgbGroupByAddr.has(addr)) {
                syncRgbSlaveFromBusState(addr, next);
                queueRender();
                return;
              }
              applyLightStateToRow(addr);
              queueCountsUpdate();
              if (showActiveOnly && prevActive !== nowActive) queueRender();
              return;
            }
            if (msg.type === 'ha_light_state') {
              const ev = msg.data || {};
              const addr = String(ev.entity_id || '').trim();
              if (!addr) return;
              const next = { state: ev.state, brightness: ev.brightness };
              stateByAddr.set(addr, next);
              const nowActive = isActiveState(next);
              const prevActive = activeByAddr.get(addr);
              activeByAddr.set(addr, nowActive);
              applyLightStateToRow(addr);
              queueCountsUpdate();
              if (showActiveOnly && prevActive !== nowActive) queueRender();
              return;
            }
            if (msg.type === 'ha_switch_state') {
              const ev = msg.data || {};
              const addr = String(ev.entity_id || '').trim();
              if (!addr) return;
              const next = { state: ev.state, brightness: 0 };
              stateByAddr.set(addr, next);
              const nowActive = isActiveState(next);
              const prevActive = activeByAddr.get(addr);
              activeByAddr.set(addr, nowActive);
              applyLightStateToRow(addr);
              queueCountsUpdate();
              if (showActiveOnly && prevActive !== nowActive) queueRender();
              return;
            }
            if (msg.type === 'light_scenario_state') {
              applyScenarioStateEvent(msg.data || {});
              return;
            }
            if (msg.type === 'light_scenario_running') {
              applyScenarioRunningEvent(msg.data || {});
              return;
            }
          } catch (e) {}
        };
      }

      (async () => { 
        try { 
          uiLog('load_start', 'init');
          const hasCollapsedPref = (localStorage.getItem(LS_COLLAPSED) !== null);
          try {
            showActiveOnly = JSON.parse(localStorage.getItem('buspro_show_active_only_lights') || 'false') === true;
          } catch (e) { showActiveOnly = false; }
          try {
            const raw = JSON.parse(localStorage.getItem(LS_COLLAPSED) || '[]');
            if (Array.isArray(raw)) collapsedGroups = new Set(raw.map((x) => String(x || '').trim()).filter(Boolean));
          } catch (e) { collapsedGroups = new Set(); }
          const fb = qs('filterBtn');
          if (fb) fb.classList.toggle('on', !!showActiveOnly);
          const meta = await getJson('api/meta', { cache:'no-store' }, 12000); 
          uiLog('meta_ok', 'ok');
          window.__backGestureEnabled = !(meta && typeof meta.back_gesture_enabled === 'boolean') ? true : !!meta.back_gesture_enabled;
          groupOrder = Array.isArray(meta.group_order) ? meta.group_order.map(normalizeGroup).filter(Boolean) : []; 
          lastDevices = await getJson('api/user/devices', { cache:'no-store' }, 12000); 
          uiLog('devices_ok', `count=${Array.isArray(lastDevices) ? lastDevices.length : 0}`);
          refreshDeviceIndex();
          // Default: all groups expanded on first load (no collapsed preference).
          queueRender(); 
        } catch (e) {
          const msg = (e && e.name === 'AbortError') ? 'timeout caricamento dati' : (e && e.message ? e.message : String(e));
          uiLog('load_error', msg);
          try {
            qs('list').innerHTML = '<div class="section"><span>Errore caricamento</span><span class="count">offline</span></div>';
            qs('err').textContent = 'Pagina non caricata: ' + msg + '. Riapri la pagina o aggiorna.';
          } catch (ignore) {}
        } 
        if (window.busproPollMode) startPolling();
        else connectWs(); 
      })(); 

      window.addEventListener('error', (evt) => {
        try { uiLog('js_error', (evt && evt.message) || 'error'); } catch (e) {}
      });
      window.addEventListener('unhandledrejection', (evt) => {
        try {
          const r = evt && evt.reason;
          uiLog('js_rejection', (r && r.message) ? r.message : String(r || 'rejection'));
        } catch (e) {}
      });

      qs('filterBtn').addEventListener('click', () => {
        animatePress(qs('filterBtn'));
        showActiveOnly = !showActiveOnly;
        try { localStorage.setItem('buspro_show_active_only_lights', JSON.stringify(showActiveOnly)); } catch (e) {}
        qs('filterBtn').classList.toggle('on', !!showActiveOnly);
        queueRender();
      });

      qs('collapseBtn').addEventListener('click', () => {
        animatePress(qs('collapseBtn'));
        const allLights = lastDevices
          .filter(isLightListDevice)
          .slice();
        const groups = new Set(allLights.map((d) => groupKeyFromGroup(d.group)));
        const keys = Array.from(groups);
        const allCollapsed = keys.length > 0 && keys.every((k) => collapsedGroups.has(k));
        collapsedGroups = new Set(allCollapsed ? [] : keys);
        try { localStorage.setItem(LS_COLLAPSED, JSON.stringify(Array.from(collapsedGroups))); } catch (e) {}
        queueRender();
      });

      // Scenarios navigation + editor
      qs('scenesPageBtn').addEventListener('click', () => {
        animatePress(qs('scenesPageBtn'));
        try { window.location.href = absUrl('scenarios'); } catch (e) {}
      });
      qs('extraPageBtn').addEventListener('click', () => {
        animatePress(qs('extraPageBtn'));
        try { window.location.href = absUrl('extra'); } catch (e) {}
      });
      qs('scenesSettingsBtn').addEventListener('click', () => { animatePress(qs('scenesSettingsBtn')); openScenarios(); });
      qs('scCloseBtn').addEventListener('click', () => { animatePress(qs('scCloseBtn')); closeScenarios(); });
      qs('scNewBtn').addEventListener('click', () => { animatePress(qs('scNewBtn')); openNewScenarioEditor(); });
      qs('scSaveOnBtn').addEventListener('click', () => { animatePress(qs('scSaveOnBtn')); saveScenario({ onlyOn: true }); });
      qs('scSaveOffBtn').addEventListener('click', () => { animatePress(qs('scSaveOffBtn')); saveScenario({ onlyOff: true }); });
      qs('scSaveAllBtn').addEventListener('click', () => { animatePress(qs('scSaveAllBtn')); saveScenario({ onlyOn: false }); });
      qs('scBackBtn').addEventListener('click', () => { animatePress(qs('scBackBtn')); closeScenarioEditor(); });
      qs('scSaveEditBtn').addEventListener('click', () => { animatePress(qs('scSaveEditBtn')); saveScenarioEdits(); });
      if (qs('scTrigType')) qs('scTrigType').addEventListener('change', updateTriggerInputs);
      if (qs('scHaTrigEnabled')) qs('scHaTrigEnabled').addEventListener('change', updateTriggerInputs);
      if (qs('scHaTrigId')) qs('scHaTrigId').addEventListener('change', updateTriggerInputs);
      updateTriggerInputs();
      qs('scAddSearch').addEventListener('input', () => renderScenarioAddList());
      try { qs('scCoverAddSearch').addEventListener('input', () => renderScenarioCoverAddList()); } catch (e) {}
      qs('scGroupSelect').addEventListener('change', () => {
        try { localStorage.setItem(LS_SC_GROUP, selectedScenarioGroupKey()); } catch (e) {}
        try { renderScenarioAddList(); } catch (e) {}
        try { renderScenarioCoverAddList(); } catch (e) {}
      });
      qs('scenesModalBack').addEventListener('click', (evt) => {
        if (evt && evt.target === qs('scenesModalBack')) closeScenarios();
      });
      document.addEventListener('keydown', (evt) => {
        if (evt && evt.key === 'Escape') closeScenarios();
      });

      // Deep-link: /lights?sc=1 opens scenario editor
      (function () {
        try {
          const u = new URL(window.location.href);
          if (u.searchParams.get('sc') === '1') {
            setTimeout(() => { try { openScenarios(); } catch (e) {} }, 50);
          }
        } catch (e) {}
      })();

      window.addEventListener('resize', () => queueCenter());
    </script>
    <script>
      // Hidden back gesture: long-press top-left corner.
      (function () {
        async function backEnabled() {
          if (typeof window.__backGestureEnabled === 'boolean') return window.__backGestureEnabled;
          try {
            const meta = await getJson('api/meta');
            return !(meta && typeof meta.back_gesture_enabled === 'boolean') ? true : !!meta.back_gesture_enabled;
          } catch (e) {
            return true;
          }
        }
        (async () => {
          const enabled = await backEnabled();
          if (!enabled) return;
          const CORNER = 60;
          const HOLD_MS = 450;
          let timer = null;
          function inCorner(e) {
            return !!e && Number(e.clientX) <= CORNER && Number(e.clientY) <= CORNER;
          }
          function goHome() {
            try {
              window.location.href = new URL('home2', window.location.href).toString();
            } catch (e) {}
          }
          function doBack() {
            try {
              if (window.history && window.history.length > 1) {
                window.history.back();
                return;
              }
            } catch (e) {}
            goHome();
          }
          function clear() {
            if (timer) {
              clearTimeout(timer);
              timer = null;
            }
          }
          document.addEventListener('pointerdown', (e) => {
            if (timer) return;
            if (!inCorner(e)) return;
            timer = setTimeout(() => {
              timer = null;
              doBack();
            }, HOLD_MS);
          }, { passive: true });
          document.addEventListener('pointerup', clear, { passive: true });
          document.addEventListener('pointercancel', clear, { passive: true });
          document.addEventListener('pointermove', (e) => {
            if (!timer) return;
            if (!inCorner(e)) clear();
          }, { passive: true });
        })();
      })();
    </script>
  </body>
</html>
